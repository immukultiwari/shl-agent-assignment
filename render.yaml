services:
  - type: web
    name: shl-assessor
    env: python
    plan: free
    repo: https://github.com/immukultiwari/shl-agent-assignment.git
    branch: master  # Changed from main to match your git status branch
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: ./data/shl_chroma_db  # Relative path pointing straight to your repo folder